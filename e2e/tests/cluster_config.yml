# csi-ceph e2e nested test cluster.
#
# 1 master + 3 storage workers. csi-ceph has no Ceph cluster of its own, so the
# suite stands one up through an sds-elastic ElasticCluster (vendored Rook) and
# then exercises csi-ceph's RBD + CephFS StorageClasses. Three workers are enough
# for the ConsistencyAndAvailability replication the suite uses (3 mons, OSDs on
# >=3 distinct nodes).
#
# Raw OSD disks are NOT declared here: storage-e2e's cluster config schema has no
# per-node "additional disks" field. Instead the suite attaches raw VirtualDisks
# to every worker VM at runtime in BeforeSuite (storage-e2e AttachVirtualDiskToVM),
# then sds-node-configurator surfaces them as consumable BlockDevices the
# ElasticCluster adopts for OSDs. In the Commander CI flow the template
# pre-provisions the disks instead, and the runtime attach is skipped.
#
# Modules enabled here are the minimum the e2e harness needs on top of a freshly
# bootstrapped Deckhouse:
#   - snapshot-controller    : CSI snapshotter, dependency of the storage stack
#   - sds-node-configurator  : scans block devices on each node and publishes
#                              BlockDevice CRs (the OSD disks the EC adopts)
#   - csi-ceph               : the module under test; provisions the
#                              CephClusterConnection / CephStorageClass and the
#                              RBD/CephFS CSI drivers. modulePullOverride defaults
#                              to the literal "main"; override it for CI by
#                              exporting CSI_CEPH_MODULE_PULL_OVERRIDE=pr<N>/mr<N>.
#   - sds-elastic            : provides the Ceph substrate (vendored Rook) the
#                              ElasticCluster / ElasticStorageClass are served by.
clusterDefinition:
  masters:
    - hostname: "master-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  workers:
    - hostname: "worker-1"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-2"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
    - hostname: "worker-3"
      hostType: "vm"
      osType: "Ubuntu 22.04 6.2.0-39-generic"
      cpu: 4
      coreFraction: 50
      ram: 8
      diskSize: 50
  dkpParameters:
    kubernetesVersion: "Automatic"
    podSubnetCIDR: "10.112.0.0/16"
    serviceSubnetCIDR: "10.225.0.0/16"
    clusterDomain: "cluster.local"
    registryRepo: "dev-registry.deckhouse.io/sys/deckhouse-oss"
    devBranch: "main"
    modules:
      - name: "snapshot-controller"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies: []
      - name: "sds-node-configurator"
        version: 1
        enabled: true
        settings:
          enableThinProvisioning: true
        dependencies: []
      - name: "csi-ceph"
        version: 1
        enabled: true
        # Static default tag (must be literal — storage-e2e rejects ${VAR} here).
        # CI overrides it WITHOUT editing this file by exporting
        # CSI_CEPH_MODULE_PULL_OVERRIDE, e.g. "pr<N>" on GitHub, "mr<N>" on GitLab
        # (the override and the static tag are logged at config load).
        modulePullOverride: "main"
        dependencies:
          - "snapshot-controller"
      - name: "sds-elastic"
        version: 1
        enabled: true
        modulePullOverride: "main"
        dependencies:
          - "snapshot-controller"
          - "sds-node-configurator"
          - "csi-ceph"
