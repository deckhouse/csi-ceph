# Thin caller for the reusable storage-e2e pipeline. The e2e run only fires when
# the PR carries the `e2e/commander/run` label (set it on the PR to trigger).
# Other labels: `e2e/keep-cluster` (skip teardown), `e2e/label:<suite>` (Ginkgo
# label filter). See storage-e2e docs/CI.md for the secrets/vars to configure.
#
# The msCrcData suite is excluded by default (label_filter '!msCrcData') because it
# needs a dedicated Ceph cluster brought up born CRC-off — flipping ms_crc_data on
# a running cluster wedges it. Run it on demand by adding the `e2e/label:msCrcData`
# PR label (alongside `e2e/commander/run`); that stands up its own CRC-off
# ElasticCluster and skips the default lifecycle suite.

name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    # Gate: run only when the PR is labeled e2e/commander/run.
    if: ${{ contains(github.event.pull_request.labels.*.name, 'e2e/commander/run') }}
    # storage-e2e main carries the commander provider, in-process connect (SSH
    # tunnel + kubeconfig fetch) and bootstrap-side module enablement.
    uses: deckhouse/storage-e2e/.github/workflows/e2e.yml@main
    with:
      module_slug: csi-ceph
      # The e2e Go module lives under e2e/; tests are in e2e/tests/.
      module_path: e2e
      test_package: ./tests/
      # CI config: modulePullOverride is ${E2E_MODULE_IMAGE_TAG}, resolved during
      # bootstrap (module enablement) to the PR image tag below.
      cluster_config: e2e/tests/cluster_config.ci.yml
      # Create a fresh cluster through Deckhouse Commander for each run. The
      # template pre-provisions the storage workers and their raw OSD block
      # devices (>=4), so the suite skips the runtime VirtualDisk attach and
      # adopts the devices the template already exposes.
      cluster_provider: commander
      # Check out the same storage-e2e ref for scripts / cmd / Go code.
      storage_e2e_ref: main
      # Install the image built for this PR (build_dev publishes the pr<N> tag).
      module_image_tag: pr${{ github.event.pull_request.number }}
      # Default runs skip the msCrcData suite; add e2e/label:msCrcData to run it.
      label_filter: '!msCrcData'
    secrets: inherit
