apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    heritage: deckhouse
    module: csi-ceph
    rbac.deckhouse.io/aggregate-to-csi-ceph-as: viewer
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/level: module
    rbac.deckhouse.io/namespace: d8-csi-ceph
  name: d8:manage:permission:subsystem:csi-ceph:view_resources
rules:
  - apiGroups:
      - storage.deckhouse.io
    resources:
      - cephstorageclasses
      - cephclusterconnections
      - cephclusterauthentications
      - cephmetadatabackups
    verbs:
      - get
      - list
      - watch
