{{- /* Webhook TLS Certs Secret */ -}}
{{- $secretConfig := dict
  "valuesKey" "csiCeph"
  "webhookCertPath" "internal.customWebhookCert"
}}
{{ include "helm_lib_module_webhook_certs_secret" (list . $secretConfig) }}

{{- /* StorageClass label ignored prefixes: system list (hardcoded in internal values) +
       user-configurable list from ModuleConfig. Comma-joined for the controller. */ -}}
{{- $systemIgnoredPrefixes := default (list) .Values.csiCeph.internal.storageClassLabelIgnoredPrefixesSystem }}
{{- $userIgnoredPrefixes := default (list) .Values.csiCeph.storageClassLabelIgnoredPrefixes }}
{{- $ignoredPrefixes := concat $systemIgnoredPrefixes $userIgnoredPrefixes | uniq }}

{{- /* Controller Deployment */ -}}
{{- $config := dict
  "valuesKey" "csiCeph"
  "webhookEnabled" true
  "webhookCertPath" "internal.customWebhookCert"
  "onMasterNode" true
  "podSecurityContext" "deckhouse"
  "additionalControllerEnvs" (list
    (dict "name" "STORAGE_CLASS_LABEL_IGNORED_PREFIXES" "value" (join "," $ignoredPrefixes))
    (dict "name" "MS_CRC_DATA" "value" (.Values.csiCeph.msCrcData | toString))
  )
}}
{{ include "helm_lib_module_controller_manifests" (list . $config) }}

{{- /* Webhook Service */ -}}
{{ include "helm_lib_module_webhook_service" (list . dict) }}

{{- /* ValidatingWebhookConfiguration */ -}}
{{- $webhookConfig := dict
  "name" "sc-validation"
  "webhookName" "sc-validation"
  "valuesKey" "csiCeph"
  "path" "/sc-validate"
  "rules" (list (dict "apiGroups" (list "storage.k8s.io") "apiVersions" (list "v1") "operations" (list "*") "resources" (list "storageclasses") "scope" "Cluster"))
}}
{{ include "helm_lib_module_validating_webhook_configuration" (list . $webhookConfig) }}
