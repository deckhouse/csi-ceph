{{- /*
csi-ceph distroless image. The Ceph CSI plugin (cephcsi) is built from the
upstream ceph/ceph-csi repository (with our CVE patches) and links the Ceph
client C libraries (librbd, librados, libcephfs) via cgo, so it is built with
CGO_ENABLED=1 on the glibc builder/golang image.

All userspace tooling that cephcsi shells out to, the Ceph client binaries and
the runtime shared libraries are provisioned via `pm install` from the
Deckhouse container-base/base-images package catalog. `pm install` merges the
packages' /usr trees into the final filesystem in dependency order, so the
previous binary_replace.sh / ldd relocation step is no longer required.

Runtime binary -> package map:

  /csi-ceph                                  - cephcsi (built here)
  mount.ceph, ceph-fuse                      - cephfs
  rbd, rbd-nbd                               - rbd
  mount, umount, blkid, blockdev, mkfs       - util-linux
  e2fsck, fsck.ext4, mkfs.ext4, dumpe2fs,
  resize2fs                                  - e2fsprogs
  fsck.xfs, mkfs.xfs, xfs_io, xfs_growfs     - xfsprogs
  modprobe, kmod                             - kmod
*/ -}}
---
# do not remove this image: used in external audits (DKP CSE)
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
from: {{ index $.Images "builder/src" }}
final: false

git:
  - add: {{ .ModuleDir }}
    to: /src
    includePaths:
      - images/{{ $.ImageName }}
    stageDependencies:
      install:
        - '**/*'
    excludePaths:
      - images/{{ $.ImageName }}/werf.inc.yaml

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  install:
    - git clone --branch v{{ include "get_oss_version_by_id" (list "cephcsi" .) }} --depth 1 $(cat /run/secrets/SOURCE_REPO)/ceph/ceph-csi.git /src/ceph-csi
    - cd /src/ceph-csi
    - for patchfile in /src/images/csi-ceph/patches/*.patch ; do echo -n "Apply ${patchfile} ... "; git apply ${patchfile}; done
    - rm -rf /src/images/csi-ceph/patches/

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
# cephcsi links the Ceph client C libraries (cgo, glibc), so it is built on the
# glibc builder/golang image; the musl builder/alpine-svace image cannot be used.
from: {{ index $.Images "builder/golang" }}
final: false

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: setup

mount:
{{ include "mount points for golang builds" . }}

secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}

shell:
  install:
    - pm install make gnu-gcc gnu-glibc-devel git pkgconf ceph-devel librbd libcephfs{{ if ne .SVACE_ENABLED "false" }} svace rsync ssh-static{{ end }}
  setup:
    - export GOPROXY=$(cat /run/secrets/GOPROXY)
    - cd /src/ceph-csi
    - export CGO_ENABLED=1
    - |
      {{- include "image-build.build" (set $ "BuildCommand" `make cephcsi`) | nindent 6 }}
    - cp _output/cephcsi /{{ $.ImageName }}

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /{{ $.ImageName }}
    to: /{{ $.ImageName }}
    before: setup
  # libcephfs (loaded by cephcsi) -> libboost_charconv -> libquadmath.so.0.
  # libquadmath ships only inside the heavy gnu-gcc compiler package and has no
  # standalone runtime package in the container-base catalog, so `pm install`
  # cannot resolve it and cephcsi fails at startup with
  # "libquadmath.so.0: cannot open shared object file". The glibc build stage
  # already has gnu-gcc installed, so copy just the runtime lib (and its SONAME
  # symlink) from there.
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /usr/lib64/libquadmath.so.0.0.0
    to: /usr/lib64/libquadmath.so.0.0.0
    before: setup
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /usr/lib64/libquadmath.so.0
    to: /usr/lib64/libquadmath.so.0
    before: setup
git:
{{- include "image mount points" . }}
shell:
  setup:
    - |
      pm install \
        gnu-glibc \
        coreutils \
        util-linux \
        e2fsprogs \
        xfsprogs \
        kmod \
        libfuse \
        librbd \
        libcephfs \
        rbd \
        cephfs
imageSpec:
  config:
    entrypoint: ["/{{ $.ImageName }}"]
