---
image: {{ $.ImageName }}-artifact
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/alt-go-svace" }}
final: false

git:
  - add: /hooks/go
    to: /usr/src/app/hooks/go
    stageDependencies:
      install:
        - '**/go.mod'
        - '**/go.sum'
      beforeSetup:
        - '**/*.go'
  - add: /api
    to: /usr/src/app/api
    stageDependencies:
      install:
        - '**/go.mod'
        - '**/go.sum'
      beforeSetup:
        - '**/*.go'

mount:
- fromPath: ~/go-pkg-cache
  to: /go/pkg

shell:
  install:
    - cd /usr/src/app/hooks/go
    - go mod download
  beforeSetup:
    - |
      cd /usr/src/app/hooks/go;
      export CGO_ENABLED=0
      {{- include "image-build.build" (set $ "BuildCommand" `go build -a -gcflags=all="-l -B" -ldflags="-w -s" -o /usr/local/bin/go-hooks *.go;`) | nindent 6 }}