type: object
required:
  - cephfsEnabled
  - rbdEnabled
properties:
  cephfsEnabled:
    type: boolean
    default: true
    description: Enable or disable the CephFS CSI driver. When set to false, the CephFS driver controller and CSIDriver resources will not be deployed.
  rbdEnabled:
    type: boolean
    default: true
    description: Enable or disable the RBD CSI driver. When set to false, the RBD driver controller and CSIDriver resources will not be deployed.
  logLevel:
    type: string
    enum:
      - ERROR
      - WARN
      - INFO
      - DEBUG
      - TRACE
    description: Module log level
    default: DEBUG
  cephfsProvisionerWorkers:
    type: integer
    default: 10
    description: Settings for CephFS provisioner workers (default 10). Please do not set this value if you are not sure what you are doing.
  rbdProvisionerWorkers:
    type: integer
    default: 10
    description: Settings for RBD provisioner workers (default 10). Please do not set this value if you are not sure what you are doing.
  msCrcData:
    type: boolean
    default: true
    description: |
      Enable or disable CRC32C checksum verification on Ceph messenger data frames.

      WARNING: Do not disable this option unless you fully understand the consequences. When set to false, the `ms_crc_data` option in ceph.conf is disabled. This reduces Ceph's ability to detect corrupted messenger data frames and may result in silent data corruption, data inconsistency, or data loss.

      The recommended and safe value is `true`.

      NOTE: Changing this value only affects new Ceph client operations performed by the CSI driver: new volume provisioning, as well as new attach/mount operations. Already mounted volumes keep using the previous `ms_crc_data` value until they are physically unmounted from the node and mounted again.

      NOTE: When this option is set to false, the RBD and CephFS StorageClasses managed by the module are configured to talk to Ceph over the legacy messenger protocol msgr1 (`ms_mode=legacy`). The kernel clients (krbd and the CephFS kernel mount) cannot use msgr2 with CRC disabled — they reject the CRC-less frames and the volume fails to map/mount — so msgr1 is required. This assumes the Ceph monitors keep the msgr1 port (6789) available.
  storageClassLabelIgnoredPrefixes:
    type: array
    default:
      - argocd.argoproj.io/
      - kustomize.toolkit.fluxcd.io/
      - helm.toolkit.fluxcd.io/
      - fleet.cattle.op/
    items:
      type: string
    description: |
      List of label-key prefixes that MUST NOT be propagated from a CephStorageClass
      to the managed Kubernetes StorageClass.

      The controller treats this list as a complement to a built-in (system) list and
      drops any CephStorageClass label whose key starts with any prefix from either list.

      The defaults cover labels typically added by GitOps tooling (Argo CD, Flux,
      Rancher Fleet) so that their reconcilers do not fight the storage controller
      over labels on the managed StorageClass.
