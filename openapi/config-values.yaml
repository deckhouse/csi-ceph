type: object
required:
  - cephfsEnabled
  - rbdEnabled
properties:
  cephfsEnabled:
    type: boolean
    default: true
    description: Enable or disable the CephFS CSI driver. When set to false, the CephFS driver controller and CSIDriver resources will not be deployed.
  rbdEnabled:
    type: boolean
    default: true
    description: Enable or disable the RBD CSI driver. When set to false, the RBD driver controller and CSIDriver resources will not be deployed.
  logLevel:
    type: string
    enum:
      - ERROR
      - WARN
      - INFO
      - DEBUG
      - TRACE
    description: Module log level
    default: DEBUG
  cephfsProvisionerWorkers:
    type: integer
    default: 10
    description: Settings for CephFS provisioner workers (default 10). Please do not set this value if you are not sure what you are doing.
  rbdProvisionerWorkers:
    type: integer
    default: 10
    description: Settings for RBD provisioner workers (default 10). Please do not set this value if you are not sure what you are doing.
  msCrcData:
    type: boolean
    default: true
    description: |
      Enable or disable CRC32C checksum verification on Ceph messenger data frames.
      WARNING: Do not disable this option unless you fully understand the consequences. When set to false, the `ms_crc_data` option in ceph.conf is disabled. This reduces Ceph's ability to detect corrupted messenger data frames and may result in silent data corruption, data inconsistency, or data loss.
      The recommended and safe value is `true`.

